name: Claude Code Plugin Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-plugin:
    name: Validate plugin (real signal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools dependencies
        working-directory: tools
        run: npm ci

      - name: Install MCP dependencies
        working-directory: mcp
        run: npm install --prefer-offline

      - name: Lint JSON config files
        run: |
          for f in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            hooks/hooks.json \
            .claude/settings.json; do
            echo "Parsing $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done

      - name: Run tools unit tests
        working-directory: tools
        run: npm test

      - name: Validate every ADR against the template
        working-directory: tools
        run: node cli.js validate-adr

      - name: Verify subagents are in sync with members.yml
        working-directory: tools
        run: node cli.js generate-subagents --check

      - name: Verify framework source discovery resolves to the repo root
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}
        working-directory: tools
        run: |
          RESOLVED=$(node cli.js find-source)
          test "$RESOLVED" = "${{ github.workspace }}" \
            || { echo "find-source returned $RESOLVED, expected ${{ github.workspace }}"; exit 1; }

      - name: Verify documentation links resolve
        working-directory: tools
        run: node cli.js validate

      - name: Verify required plugin layout
        run: |
          for skill in setup-architect architecture-review create-adr \
                       list-members architecture-status specialist-review \
                       pragmatic-guard; do
            test -f "skills/$skill/SKILL.md" \
              || { echo "Missing skills/$skill/SKILL.md"; exit 1; }
          done
          for member in systems-architect domain-expert security-specialist \
                        maintainability-expert performance-specialist \
                        implementation-strategist ai-engineer pragmatic-enforcer; do
            test -f "agents/$member.md" \
              || { echo "Missing agents/$member.md"; exit 1; }
          done

  fixture-compatibility:
    name: Fixture project compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project-type: [nodejs, rails, python, generic]
    steps:
      - uses: actions/checkout@v4

      - name: Create fixture project
        run: |
          mkdir -p "test-projects/${{ matrix.project-type }}"
          cd "test-projects/${{ matrix.project-type }}"
          case "${{ matrix.project-type }}" in
            nodejs)  echo '{"name":"test-app","version":"1.0.0"}' > package.json ;;
            rails)   printf 'source "https://rubygems.org"\ngem "rails"\n' > Gemfile ;;
            python)  echo 'flask==3.0.0' > requirements.txt ;;
            generic) echo '# Generic project' > README.md ;;
          esac

      - name: Copy framework artifacts the fixture would receive
        run: |
          cp -r .architecture "test-projects/${{ matrix.project-type }}/"
          cp -r .coding-assistants "test-projects/${{ matrix.project-type }}/"

      - name: Verify required files exist in fixture
        run: |
          cd "test-projects/${{ matrix.project-type }}"
          test -f .architecture/members.yml
          test -f .architecture/principles.md
          test -f .architecture/config.yml
          test -d .architecture/decisions/adrs
          test -d .architecture/templates
          test -d .coding-assistants/cursor
          test -d .coding-assistants/codex

  claude-smoke:
    name: Real Claude CLI smoke test (manual)
    # Real-CLI tests cost API credits and require a secret; gated to
    # workflow_dispatch so push/PR runs stay free. ADR-012 Phase 5 documents
    # this gating decision.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify plugin loads and exposes skills
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret is not configured; skipping live smoke test."
            exit 0
          fi
          OUTPUT=$(claude --plugin-dir ./ -p \
            "List the names of every skill loaded from this plugin, one per line." \
            --max-turns 1 || true)
          echo "$OUTPUT"
          # The skills with disable-model-invocation: true (setup-architect,
          # create-adr, pragmatic-guard) deliberately do not appear in
          # "list loaded skills" output - they are user-invoked only. SKILL.md
          # presence for all seven is verified by validate-plugin's "required
          # plugin layout" step. This smoke asserts only on the auto-invocable
          # subset so the assertion stays consistent with documented behavior.
          for skill in architecture-review architecture-status \
                       list-members specialist-review; do
            echo "$OUTPUT" | grep -q "$skill" \
              || { echo "Skill '$skill' not present in CLI output"; exit 1; }
          done
