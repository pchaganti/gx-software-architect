# ----------------------------------------------------------------------------
# TIPS
# ----------------------------------------------------------------------------
# - Be specific: "Modern JavaScript/TypeScript" not just "JavaScript".
# - Match your stack: add specialists for YOUR technologies, not every
#   possible one.
# - Don't overload: 5-7 technology specialists plus the core members is
#   usually plenty. Past ~12 total members, reviews become noisy.
# - Each member should bring a distinct lens. If two members would say
#   the same thing, merge them.
# - Sanity-check by running `node tools/cli.js generate-subagents` after
#   editing — if the resulting agents/<id>.md doesn't read sensibly, the
#   member entry probably needs more specificity.
